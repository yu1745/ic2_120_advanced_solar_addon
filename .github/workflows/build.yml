# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: clone ic2-fabric dependency
        run: git clone https://github.com/yu1745/ic2-fabric.git ../ic2-fabric --depth 1 --branch main
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: |
          chmod +x ./gradlew
          chmod +x ../ic2-fabric/gradlew
      - name: build ic2-fabric dependency
        run: cd ../ic2-fabric && ./gradlew build
      - name: build
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: build-output
      - name: filter mod jar
        run: |
          mkdir -p mod-release
          for f in build-output/ic2_120_advanced_solar_addon-*.jar; do
            [[ "$f" != *-sources* && "$f" != *-remapped* ]] && cp "$f" "mod-release/$(basename "$f" .jar)-mc1.20.1.jar"
          done
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-1.20.1-${{ github.run_number }}
          files: mod-release/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
